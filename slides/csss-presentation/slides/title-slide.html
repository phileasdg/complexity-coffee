<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation Title Slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
  <script src="../d3.v7.min.js"></script>
  <style>
    :root {
      --bg-color: #f8f9fa; /* Crisp light grey background */
      --text-dark: #1a202c; /* Deep slate */
      --text-muted: #718096;
      --accent-navy: #264653; /* Deep Teal */
      --accent-teal: #264653; /* Uniform Deep Teal */
      --border-color: #e2e8f0;
      
      --accent-slate: #2b2d42; /* Deep Navy Slate */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
    }

    #network-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .title-card {
      max-width: 800px;
      width: 100%;
      min-height: 380px;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 80px 48px;
      background-color: #ffffff;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      z-index: 2;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 680px;
    }

    .main-title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 3.5rem;
      line-height: 1.15;
      color: var(--accent-navy);
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 1.25rem;
      color: #2c2c2c;
      line-height: 1.55;
    }

    .divider {
      width: 60px;
      height: 3px;
      background-color: var(--accent-teal);
      border-radius: 2px;
      margin-top: 8px;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <svg id="network-bg"></svg>

  <div class="title-card">
    <div class="title-group">
      <h1 class="main-title">Complexity Coffee</h1>
      <p class="subtitle">Cultivating a grassroots complexity science community across borders</p>
      <div class="divider"></div>
    </div>
  </div>

  <script>
    const svg = d3.select("#network-bg");
    let width = window.innerWidth;
    let height = window.innerHeight;
    
    svg.attr("width", width).attr("height", height);

    // Generate 65 background nodes
    const numNodes = 65;
    const nodes = d3.range(numNodes).map(i => ({
      id: i,
      radius: Math.random() * 5 + 3,
      type: Math.floor(Math.random() * 3) 
    }));

    // Random connections
    const links = [];
    for (let i = 0; i < numNodes * 1.3; i++) {
      links.push({
        source: Math.floor(Math.random() * numNodes),
        target: Math.floor(Math.random() * numNodes)
      });
    }

    // Vivid Palette
    const colors = {
      0: "#e86a8e", // Soft Rose
      1: "#37b392", // Soft Minty Teal
      2: "#44b0e8"  // Soft Sky Blue
    };

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).distance(90).strength(0.02))
      .force("charge", d3.forceManyBody().strength(-30))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collide", d3.forceCollide().radius(d => d.radius + 1));

    const link = svg.append("g")
      .attr("stroke", "#cbd5e1")
      .attr("stroke-opacity", 0.4)
      .selectAll("line")
      .data(links)
      .join("line")
      .attr("stroke-width", 1);

    const node = svg.append("g")
      .selectAll("circle")
      .data(nodes)
      .join("circle")
      .attr("r", d => d.radius)
      .attr("fill", d => colors[d.type])
      .attr("opacity", 0.6);

    // Gently drift slowly
    simulation.force("x", d3.forceX(width / 2).strength(0.015))
              .force("y", d3.forceY(height / 2).strength(0.015));

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      node
        .attr("cx", d => d.x = Math.max(d.radius, Math.min(width - d.radius, d.x)))
        .attr("cy", d => d.y = Math.max(d.radius, Math.min(height - d.radius, d.y)));
    });

    window.addEventListener("resize", () => {
      width = window.innerWidth;
      height = window.innerHeight;
      svg.attr("width", width).attr("height", height);
      simulation.force("center", d3.forceCenter(width / 2, height / 2));
      simulation.alpha(0.3).restart();
    });
  </script>
</body>
</html>
