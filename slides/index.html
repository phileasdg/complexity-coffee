<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complexity Coffee - Presentations</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sfi: {
                            ming: '#003d5b',
                            sea: '#00a9b7',
                            turmeric: '#f5a623',
                            warm: '#ecebe6',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ecebe6;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 bg-[#ecebe6]">
    <div class="w-full max-w-2xl glass-panel rounded-2xl shadow-xl p-8 md:p-12 transition-all duration-300">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-black font-serif text-sfi-ming mb-3">Complexity Coffee</h1>
            <p class="text-gray-600 text-sm md:text-base">Shared Presentations Hub</p>
        </div>

        <div id="auth-section" class="space-y-6 hidden">
            <div class="text-center">
                <svg class="w-16 h-16 mx-auto text-sfi-sea/70 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <h2 class="text-xl font-bold text-gray-800">Protected Presentations</h2>
                <p class="text-gray-500 text-sm mt-1">Please enter the password to access this content.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <input type="text" id="password-input" placeholder="Password" style="-webkit-text-security: disc; text-security: disc;" autocomplete="off"
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-sfi-sea focus:border-transparent transition" required>
                </div>
                <button type="button" id="unlock-btn"
                        class="w-full py-3 bg-sfi-ming hover:bg-sfi-sea text-white font-bold rounded-lg shadow transition-colors duration-200">
                    Unlock Portal
                </button>
                <p id="error-message" class="text-red-500 text-sm text-center hidden">Incorrect password. Please try again.</p>
            </div>
        </div>

        <!-- Portal Content Section (hidden initially) -->
        <div id="portal-content" class="hidden space-y-6">
            <div class="border-b border-gray-200 pb-4">
                <span class="text-sm font-semibold text-sfi-sea uppercase tracking-wider">Available Presentations</span>
            </div>
            
            <div id="presentations-list" class="space-y-4">
                <!-- Will be loaded dynamically -->
                <div class="text-center py-8 text-gray-500 italic">Loading presentations...</div>
            </div>
        </div>

    </div>

    <script>
        let expectedHash = "9fff2d310ad659f6e05c6c1bbfcfb605cd4489e1d3860160b88220636a6353f8"; // SHA-256 for 'complexity'
        let presentationsData = [];

        async function sha256(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const authSection = document.getElementById('auth-section');
        const portalContent = document.getElementById('portal-content');
        const errorMsg = document.getElementById('error-message');
        const passwordInput = document.getElementById('password-input');
        const unlockBtn = document.getElementById('unlock-btn');
        const listContainer = document.getElementById('presentations-list');

        // Fetch configurations at load time
        async function init() {
            try {
                const response = await fetch('../data/presentations.json');
                if (response.ok) {
                    const data = await response.json();
                    expectedHash = data.hubPasswordHash || expectedHash;
                    presentationsData = data.presentations || [];
                }
            } catch (e) {
                console.error("Failed to load presentations config", e);
            }

            // Check if already authenticated
            if (sessionStorage.getItem('cc_auth_hub') === expectedHash) {
                showPortal();
            } else {
                authSection.classList.remove('hidden');
            }
        }

        async function handleUnlock() {
            const password = passwordInput.value;
            const hashedInput = await sha256(password);
            
            if (hashedInput === expectedHash) {
                sessionStorage.setItem('cc_auth_hub', expectedHash);
                errorMsg.classList.add('hidden');
                showPortal();
            } else {
                errorMsg.classList.remove('hidden');
                passwordInput.value = '';
            }
        }

        unlockBtn.addEventListener('click', handleUnlock);
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleUnlock();
            }
        });

        async function showPortal() {
            authSection.classList.add('hidden');
            portalContent.classList.remove('hidden');
            renderPresentationsList();
        }

        function renderPresentationsList() {
            const enabled = presentationsData.filter(p => p.enabled === true);

            if (enabled.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-8 text-gray-500 italic">No presentations are currently active.</div>';
                return;
            }

            listContainer.innerHTML = enabled.map(p => `
                <div class="p-5 bg-white/50 border border-gray-200/50 rounded-xl flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-white/80 transition-colors">
                    <div class="space-y-1">
                        <h3 class="font-bold text-sfi-ming text-lg font-serif">${p.title}</h3>
                        <p class="text-gray-600 text-sm leading-relaxed">${p.description || ''}</p>
                    </div>
                    <div class="flex items-center shrink-0">
                        <a href="${p.id}/" class="w-full md:w-auto text-center px-5 py-2.5 bg-sfi-ming hover:bg-sfi-sea text-white font-bold rounded-lg text-sm shadow-sm transition-colors duration-200">
                            Open Slides
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // Initialize portal page
        init();
    </script>
</body>
</html>
